<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Yatırım Günlüğü</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:          #0b0f1a;
  --card:        #111827;
  --card2:       #0f172a;
  --border:      #1e2d45;
  --text:        #e2e8f0;
  --muted:       #64748b;
  --yellow:      #f5c518;
  --green:       #22c55e;
  --red:         #ef4444;
  --orange:      #f97316;
  --teal:        #14b8a6;
  --purple:      #8b5cf6;
  --blue:        #3b82f6;
  --grid:        rgba(255,255,255,0.05);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 14px 18px;
}

/* ── Header ── */
.hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.hdr-title { font-size: 17px; font-weight: 700; color: var(--yellow); letter-spacing:.04em; }
.hdr-time  { font-size: 12px; color: var(--green); }

/* ── Top Cards ── */
.cards {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-bottom: 14px;
}
.kart {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  text-align: center;
}
.kart-lbl  { font-size: 10px; font-weight:700; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
.kart-v1   { font-size: 26px; font-weight: 700; line-height:1.1; }
.kart-v2   { font-size: 13px; color: var(--muted); margin-top: 4px; }
.kart-pct  { font-size: 15px; font-weight: 600; margin-top: 5px; }

/* ── Tab Bar ── */
.tabbar {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 5px;
  margin-bottom: 14px;
}
.tb {
  background: transparent;
  border: none;
  //color: var(--muted);
  color: var(--text)
  padding: 6px 9px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 7px;
  transition: all .18s;
}
.tb:hover { color: var(--text); }
.tb.act   { background: var(--yellow); color: #000; font-weight: 700; }

/* ── Tab Panels ── */
.panel { display: none; }
.panel.act { display: block; }

/* ── Section Box ── */
.sbox {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 14px;
}
.sbox-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* ── Data Table ── */
.dtbl { width:100%; border-collapse:collapse; }
.dtbl th {
  font-size: 14px;
  font-weight: 700;
  letter-spacing:.08em;
  //color: var(--muted);
  color: var(--text)
  text-transform: uppercase;
  padding: 7px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.dtbl td { padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,.04); }
.dtbl tr:last-child td { border-bottom: none; }
.dtbl tr:hover td { background: rgba(255,255,255,.025); }
.c-yellow { color: var(--yellow); font-weight: 600; }
.c-green  { color: var(--green);  font-weight: 600; }
.c-red    { color: var(--red);    font-weight: 600; }
.c-orange { color: var(--orange); font-weight: 600; }

/* ── Charts Row ── */
.chart-row { display: grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
.cbox {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  height: 320px;
  display: flex;
  flex-direction: column;
}
.cbox canvas { flex: 1; min-height: 0; }
.cbox-title { font-size:10px; font-weight:700; letter-spacing:.08em; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }

/* ── Analysis Cards ── */
.anlz-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.anlz-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  display: flex;
  flex-direction: column;
}
.anlz-hdr {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-bottom: 12px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.anlz-code  { font-size:22px; font-weight:700; color:var(--yellow); }
.anlz-price { font-size:12px; color:var(--muted); margin-top:3px; }
.anlz-right { text-align:right; }
.oneri-tag  { font-size:16px; font-weight:800; letter-spacing:.06em; }
.anlz-puan  { font-size:12px; color:var(--muted); margin-top:4px; }
.anlz-puan span { color:var(--text); font-weight:600; }
.anlz-sec { margin-bottom:11px; }
.anlz-sec:last-child { margin-bottom:0; }
.anlz-sec-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.anlz-sec-text { font-size:12px; line-height:1.65; color:#b0bac8; }

/* ── Yorum ── */
.yorum-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.yorum-main-title { font-size:10px; font-weight:700; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; }
.yorum-date { font-size:12px; color:var(--muted); }
.yorum-kart {
  background: rgba(255,255,255,.025);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.yorum-kart:last-child { margin-bottom:0; }
.yorum-kart-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.yorum-kart-text { font-size:13px; line-height:1.75; color:#b0bac8; }

/* ── Performans ── */
.perf-stats {
  display: flex;
  gap: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 18px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.pstat { display:flex; align-items:center; gap:5px; font-size:12px; }
.pstat-lbl { color:var(--muted); font-weight:500; }
.pstat-val { font-weight:700; }
.psep { color:#2a3d58; margin: 0 12px; font-size:14px; }

.filter-row { display:flex; justify-content:flex-end; gap:6px; margin-bottom:12px; }
.fbtn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 18px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 6px;
  transition: all .15s;
}
.fbtn:hover { color:var(--text); }
.fbtn.act { background:var(--blue); border-color:var(--blue); color:#fff; font-weight:700; }

.pcbox {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}
.pcbox:last-child { margin-bottom:0; }

/* ── Loading / Error ── */
.loading { display:flex; justify-content:center; align-items:center; padding:40px; color:var(--muted); font-size:13px; }
.error   { color:var(--red); padding:20px; font-size:13px; white-space:pre-wrap; }

/* ── Responsive — Tablet ── */
@media (max-width: 768px) {
  body { padding: 10px 12px; }

  /* 4 kart → 2x2 */
  .cards { grid-template-columns: 1fr 1fr; }

  /* Tab bar metinleri küçülsün */
  .tb { font-size: 11px; padding: 8px 4px; }

  /* İki grafik alt alta */
  .chart-row { grid-template-columns: 1fr; }
  .cbox { height: 280px; }

  /* Analiz kartları tek sütun */
  .anlz-grid { grid-template-columns: 1fr; }

  /* Performans stats wrap */
  .perf-stats { gap: 8px; padding: 10px 12px; }
  .psep { margin: 0 6px; }
}

/* ── Responsive — Telefon ── */
@media (max-width: 480px) {
  body { padding: 8px 10px; }

  .hdr-title { font-size: 14px; }
  .hdr-time  { font-size: 11px; }

  /* Kartlar 2x2 korunur, değer yazıları küçülür */
  .cards { gap: 8px; }
  .kart  { padding: 14px 12px; }
  .kart-v1  { font-size: 20px; }
  .kart-lbl { font-size: 9px; }

  /* Tab bar */
  .tabbar { padding: 4px; gap: 0; }
  .tb { font-size: 10px; padding: 7px 2px; border-radius: 5px; }

  /* Tablo sütunları sığsın */
  .dtbl th, .dtbl td { padding: 9px 8px; font-size: 11px; }

  /* Grafikler */
  .cbox { height: 240px; }

  /* Performans istatistikleri yan yana wrap */
  .perf-stats { flex-wrap: wrap; gap: 6px 10px; padding: 10px 12px; }
  .psep { display: none; }
  .filter-row { flex-wrap: wrap; gap: 5px; }
  .fbtn { padding: 5px 12px; font-size: 11px; }
}
</style>
</head>
<body>
<div class="container">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">Yatırım Günlüğü</div>
  <div class="hdr-time" id="clock">—</div>
</div>

<!-- TOP CARDS -->
<div class="cards">
  <div class="kart">
    <div class="kart-lbl">Portföy</div>
    <div class="kart-v1" style="color:var(--yellow)" id="cPortDolar">—</div>
    <div class="kart-v2" id="cPortTl">—</div>
  </div>
  <div class="kart">
    <div class="kart-lbl">Anapara</div>
    <div class="kart-v1" style="color:var(--blue)" id="cAnapara">—</div>
  </div>
  <div class="kart">
    <div class="kart-lbl">Tüm Zamanlar Kâr</div>
    <div class="kart-v1" id="cKarDolar">—</div>
    <div class="kart-pct" id="cKarPct">—</div>
  </div>
  <div class="kart">
    <div class="kart-lbl">Beta</div>
    <div class="kart-v1" id="cBeta">—</div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tabbar">
  <button class="tb act" onclick="tab('portfoy',0)">Portföy</button>
  <button class="tb"     onclick="tab('analiz',1)">Analiz</button>
  <button class="tb"     onclick="tab('yorum',2)">Yorum</button>
  <button class="tb"     onclick="tab('izleme',3)">İzleme</button>
  <button class="tb"     onclick="tab('performans',4)">Performans</button>
</div>

<!-- ── PANEL: PORTFÖY ── -->
<div id="p-portfoy" class="panel act">
  <div class="sbox">
    <div class="sbox-title">Portföy</div>
    <div id="portTbl"><div class="loading">Yükleniyor…</div></div>
  </div>
  <div class="chart-row">
    <div class="cbox">
      <div class="cbox-title">Portföy Dağılımı (%)</div>
      <canvas id="pieChart" height="260"></canvas>
    </div>
    <div class="cbox">
      <div class="cbox-title">Değer Dağılımı ($)</div>
      <canvas id="barChart"></canvas>
    </div>
  </div>
</div>

<!-- ── PANEL: ANALİZ ── -->
<div id="p-analiz" class="panel">
  <div id="analizContent"><div class="loading">Yükleniyor…</div></div>
</div>

<!-- ── PANEL: YORUM ── -->
<div id="p-yorum" class="panel">
  <div class="sbox">
    <div id="yorumContent"><div class="loading">Yükleniyor…</div></div>
  </div>
</div>

<!-- ── PANEL: İZLEME ── -->
<div id="p-izleme" class="panel">
  <div id="izlemeContent"><div class="loading">Yükleniyor…</div></div>
</div>

<!-- ── PANEL: PERFORMANS ── -->
<div id="p-performans" class="panel">
  <div class="perf-stats" id="perfStats"><div class="loading">Yükleniyor…</div></div>
  <div class="filter-row">
    <button class="fbtn act" onclick="setFilter('gunluk',0)">Günlük</button>
    <button class="fbtn"     onclick="setFilter('aylik',1)">Aylık</button>
    <button class="fbtn"     onclick="setFilter('ceyrek',2)">Çeyrek</button>
    <button class="fbtn"     onclick="setFilter('yillik',3)">Yıllık</button>
  </div>
  <div class="pcbox">
    <div class="cbox-title">Portföy Değeri (USD)</div>
    <canvas id="perfLine" height="170"></canvas>
  </div>
  <div class="pcbox">
    <div class="cbox-title">Dönemsel Kar/Zarar Değişimi (USD)</div>
    <canvas id="perfKar" height="150"></canvas>
  </div>
  <div class="pcbox">
    <div class="cbox-title">Dönemsel Para Ekleme (USD)</div>
    <canvas id="perfPara" height="150"></canvas>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
var G = {};
var charts = {};
var perfFilter = 'gunluk';
var COLORS = ['#f5c518','#3b82f6','#22c55e','#f97316','#8b5cf6','#ec4899','#14b8a6','#ef4444','#a3e635','#fb923c'];

// ═══════════════════════════════════════════════
//  FORMAT HELPERS
// ═══════════════════════════════════════════════
function fUSD(v) {
  if (isNaN(v)) return '—';
  return '$' + Math.abs(v).toLocaleString('en-US', {maximumFractionDigits:0});
}
function fTL(v) {
  if (isNaN(v)) return '—';
  return '₺' + Math.abs(v).toLocaleString('tr-TR', {maximumFractionDigits:0});
}
function fPct(v, dec) {
  if (isNaN(v)) return '—';
  dec = dec !== undefined ? dec : 2;
  return (v >= 0 ? '+' : '') + v.toFixed(dec) + '%';
}
function fNum(v, dec) { return Number(v).toFixed(dec !== undefined ? dec : 2); }
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

// ═══════════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════════
function tab(name, idx) {
  document.querySelectorAll('.tb').forEach(function(b){ b.classList.remove('act'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('act'); });
  document.querySelectorAll('.tb')[idx].classList.add('act');
  document.getElementById('p-' + name).classList.add('act');
  if (name === 'performans' && G.performance) renderPerfCharts(perfFilter);
}

// ═══════════════════════════════════════════════
//  CARDS
// ═══════════════════════════════════════════════
function renderCards(d) {
  document.getElementById('cPortDolar').textContent = fUSD(d.portfolioDolar);
  document.getElementById('cPortTl').textContent    = fTL(d.portfolioTl);
  document.getElementById('cAnapara').textContent   = fUSD(d.anapara);

  var karEl = document.getElementById('cKarDolar');
  karEl.textContent  = (d.karDolar >= 0 ? '+' : '-') + fUSD(Math.abs(d.karDolar));
  karEl.style.color  = d.karDolar >= 0 ? 'var(--green)' : 'var(--red)';

  var pctEl = document.getElementById('cKarPct');
  pctEl.textContent = '%' + Math.abs(d.karPct).toFixed(2);
  pctEl.style.color = d.karPct >= 0 ? 'var(--green)' : 'var(--red)';

  document.getElementById('cBeta').textContent = fNum(d.beta, 2);
}

// ═══════════════════════════════════════════════
//  PORTFÖY TAB
// ═══════════════════════════════════════════════
function renderPortfolio(items) {
  var h = '<table class="dtbl"><thead><tr>'
    + '<th>Varlık</th><th>Değer</th><th>Kar %</th><th>Oran</th><th>Beta</th><th>Öneri</th>'
    + '</tr></thead><tbody>';
  items.forEach(function(r) {
    h += '<tr>'
      + '<td class="c-yellow">' + esc(r.varlik) + '</td>'
      + '<td>' + fUSD(r.deger) + '</td>'
      + '<td class="' + (r.karPct >= 0 ? 'c-green' : 'c-red') + '">' + fPct(r.karPct,1) + '</td>'
      + '<td class="c-orange">' + fNum(r.oran,1) + '%</td>'
      + '<td>' + fNum(r.beta,2) + '</td>'
      + '<td style="color:' + r.oneriColor + ';font-weight:700">' + esc(r.oneriKisa) + '</td>'
      + '</tr>';
  });
  h += '</tbody></table>';
  document.getElementById('portTbl').innerHTML = h;

  var labels = items.map(function(r){ return r.varlik; });
  var values = items.map(function(r){ return r.deger; });

  // Portföy Dağılımı — yatay bar (%)
  var total = values.reduce(function(a,b){ return a+b; }, 0);
  var pctValues = values.map(function(v){ return total > 0 ? +(v/total*100).toFixed(1) : 0; });

  if (charts.pie) charts.pie.destroy();
  charts.pie = new Chart(document.getElementById('pieChart'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        data: pctValues,
        backgroundColor: COLORS,
        borderRadius: 4,
        borderWidth: 0
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          label: function(ctx){ return ' ' + ctx.parsed.x.toFixed(1) + '%'; }
        }}
      },
      scales: {
        x: {
          ticks: { color:'#64748b', font:{size:11}, callback: function(v){ return v+'%'; } },
          grid: { color:'var(--grid)' },
          max: 100
        },
        y: { ticks: { color:'#e2e8f0', font:{size:12}, fontWeight:'bold' }, grid: { display:false } }
      }
    }
  });

  // Bar
  if (charts.bar) charts.bar.destroy();
  charts.bar = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: labels, datasets: [{ data: values, backgroundColor: COLORS, borderRadius:4, borderWidth:0 }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend:{ display:false } },
      scales: {
        x: { ticks:{ color:'#64748b', font:{size:11} }, grid:{ color:'var(--grid)' } },
        y: { ticks:{ color:'#64748b', font:{size:11}, callback:function(v){return '$'+v.toLocaleString();} }, grid:{ color:'var(--grid)' } }
      }
    }
  });
}

// ═══════════════════════════════════════════════
//  ANALİZ / İZLEME CARDS
// ═══════════════════════════════════════════════
function renderAnalysisCards(containerId, items) {
  if (!items || !items.length) {
    document.getElementById(containerId).innerHTML = '<div class="loading">Veri yok</div>';
    return;
  }
  var h = '<div class="anlz-grid">';
  items.forEach(function(r) {
    h += '<div class="anlz-card">'
      + '<div class="anlz-hdr">'
      +   '<div>'
      +     '<div class="anlz-code">' + esc(r.varlik) + '</div>'
      +     '<div class="anlz-price">$' + fNum(r.fiyat,2) + '</div>'
      +   '</div>'
      +   '<div class="anlz-right">'
      +     '<div class="oneri-tag" style="color:' + r.oneriColor + '">' + esc(r.oneriKisa.toUpperCase()) + '</div>'
      +     '<div class="anlz-puan"><span>' + Math.round(r.puan) + '</span> puan</div>'
      +   '</div>'
      + '</div>'
      + '<div class="anlz-sec"><div class="anlz-sec-title">Teknik Analiz</div>'
      +   '<div class="anlz-sec-text">' + esc(r.teknikAnaliz) + '</div></div>'
      + '<div class="anlz-sec"><div class="anlz-sec-title">Akıllı Para</div>'
      +   '<div class="anlz-sec-text">' + esc(r.akilliPara) + '</div></div>'
      + '<div class="anlz-sec"><div class="anlz-sec-title">Aksiyon</div>'
      +   '<div class="anlz-sec-text">' + esc(r.oneriTam) + '</div></div>'
      + '</div>';
  });
  h += '</div>';
  document.getElementById(containerId).innerHTML = h;
}

// ═══════════════════════════════════════════════
//  YORUM
// ═══════════════════════════════════════════════
var YORUM_CFG = [
  { key:'piyasaRuhHali',    title:'Piyasa Ruh Hali',    icon:'🟡', color:'#f59e0b' },
  { key:'portfoyDurum',     title:'Portföy Durum',       icon:'🔴', color:'#ef4444' },
  { key:'portfoyPerformans',title:'Portföy Performans',  icon:'🟢', color:'#22c55e' },
  { key:'portfoyRisk',      title:'Portföy Risk',        icon:'⚠️', color:'#f97316' },
  { key:'portfoyFirsat',    title:'Portföy Fırsat',      icon:'💡', color:'#14b8a6' },
  { key:'portfoyEylem',     title:'Portföy Eylem',       icon:'🔵', color:'#8b5cf6' }
];
function renderYorum(d) {
  var h = '<div class="yorum-hdr">'
    + '<div class="yorum-main-title">Genel Yorum</div>'

// ═══════════════════════════════════════════════
//  PERFORMANS STATS
// ═══════════════════════════════════════════════
function renderPerfStats(s) {
  var items = [
    { lbl:'Haftalık', v:s.haftalik },
    { lbl:'Aylık',    v:s.aylik },
    { lbl:'6 Aylık',  v:s.altiAylik },
    { lbl:'Yıllık',   v:s.yillik },
    { lbl:'YTD',      v:s.ytd }
  ];
  var h = items.map(function(it, i) {
    var noData = it.v === null || it.v === undefined;
    var c    = noData ? 'var(--muted)' : (it.v >= 0 ? 'var(--green)' : 'var(--red)');
    var text = noData ? '—' : fPct(it.v);
    return '<div class="pstat">'
      + '<span class="pstat-lbl">' + it.lbl + ':</span>'
      + '<span class="pstat-val" style="color:' + c + '">' + text + '</span>'
      + '</div>'
      + (i < items.length-1 ? '<span class="psep">|</span>' : '');
  }).join('');
  document.getElementById('perfStats').innerHTML = h;
}

// ═══════════════════════════════════════════════
//  PERFORMANS — AGGREGATİON
// ═══════════════════════════════════════════════
function aggregate(raw, mode) {
  if (mode === 'gunluk') {
    return raw.map(function(d){ return { label:d.tarihStr, portfoy:d.portfoy, kar:d.gunlukKar, para:d.paraEkleme }; });
  }
  var groups = {}, order = [];
  raw.forEach(function(d) {
    var parts = d.tarihStr.split('.');
    var dd = +parts[0], mm = +parts[1], yy = +parts[2];
    var key;
    if (mode === 'aylik')  key = yy + '-' + String(mm).padStart(2,'0');
    if (mode === 'ceyrek') key = yy + '-Q' + Math.ceil(mm/3);
    if (mode === 'yillik') key = String(yy);
    if (!groups[key]) { groups[key] = { label:key, lastPortfoy:0, kar:0, para:0 }; order.push(key); }
    groups[key].lastPortfoy = d.portfoy;
    groups[key].kar  += d.gunlukKar;
    groups[key].para += d.paraEkleme;
  });
  return order.map(function(k){
    var g = groups[k];
    return { label:g.label, portfoy:g.lastPortfoy, kar:g.kar, para:g.para };
  });
}

// ═══════════════════════════════════════════════
//  PERFORMANS CHARTS
// ═══════════════════════════════════════════════
var TICK_OPT = { color:'#64748b', font:{ size:10 }, maxTicksLimit:16 };
var GRID_OPT = { color:'var(--grid)' };

function renderPerfCharts(mode) {
  var agg    = aggregate(G.performance.rawData, mode);
  var labels = agg.map(function(d){ return d.label; });
  var pVals  = agg.map(function(d){ return d.portfoy; });
  var kVals  = agg.map(function(d){ return d.kar; });
  var paVals = agg.map(function(d){ return d.para; });

  function yFmt(v){ return '$'+v.toLocaleString('en-US',{maximumFractionDigits:0}); }

  // Line chart
  if (charts.pLine) charts.pLine.destroy();
  charts.pLine = new Chart(document.getElementById('perfLine'), {
    type: 'line',
    data: { labels:labels, datasets:[{
      data:pVals, borderColor:'#f5c518', backgroundColor:'rgba(245,197,24,.1)',
      fill:true, tension:.35, pointRadius:0, borderWidth:2
    }]},
    options:{
      responsive:true, animation:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:TICK_OPT, grid:GRID_OPT },
        y:{ ticks:{ color:'#64748b', font:{size:10}, callback:yFmt }, grid:GRID_OPT }
      }
    }
  });

  // Kar/Zarar bar
  if (charts.pKar) charts.pKar.destroy();
  charts.pKar = new Chart(document.getElementById('perfKar'), {
    type:'bar',
    data:{ labels:labels, datasets:[{
      data:kVals,
      backgroundColor:kVals.map(function(v){ return v>=0?'rgba(34,197,94,.75)':'rgba(239,68,68,.75)'; }),
      borderRadius:2, borderWidth:0
    }]},
    options:{
      responsive:true, animation:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:TICK_OPT, grid:GRID_OPT },
        y:{ ticks:{ color:'#64748b', font:{size:10}, callback:yFmt }, grid:GRID_OPT }
      }
    }
  });

  // Para Ekleme bar
  if (charts.pPara) charts.pPara.destroy();
  charts.pPara = new Chart(document.getElementById('perfPara'), {
    type:'bar',
    data:{ labels:labels, datasets:[{
      data:paVals, backgroundColor:'rgba(59,130,246,.75)', borderRadius:2, borderWidth:0
    }]},
    options:{
      responsive:true, animation:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:TICK_OPT, grid:GRID_OPT },
        y:{ ticks:{ color:'#64748b', font:{size:10}, callback:yFmt }, grid:GRID_OPT }
      }
    }
  });
}

function setFilter(mode, idx) {
  perfFilter = mode;
  document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.remove('act'); });
  document.querySelectorAll('.fbtn')[idx].classList.add('act');
  if (G.performance) renderPerfCharts(mode);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init(data) {
  if (data.error) {
    document.body.innerHTML = '<div class="error">❌ Hata:\n' + data.error + '</div>';
    return;
  }
  G = data;

  // GitHub'a push edildiği tarih/saat
  document.getElementById('clock').textContent = data.generatedAt || '';

  renderCards(data.cards);
  renderPortfolio(data.portfolio);
  renderAnalysisCards('analizContent', data.analysis);
  renderYorum(data.commentary);
  renderAnalysisCards('izlemeContent', data.watchlist);
  renderPerfStats(data.performance.stats);
}
