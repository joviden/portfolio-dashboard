<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Yatırım Günlüğü</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:          #f1f5f9;
  --card:        #ffffff;
  --card2:       #f8fafc;
  --border:      #e2e8f0;
  --text:        #1e293b;
  --muted:       #64748b;
  --accent:      #1d4ed8;
  --yellow:      #1d4ed8;   /* eski "yellow" referansları artık indigo vurgu */
  --green:       #16a34a;
  --red:         #dc2626;
  --orange:      #ea580c;
  --teal:        #0d9488;
  --purple:      #7c3aed;
  --blue:        #2563eb;
  --grid:        rgba(15,23,42,0.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 14px 18px;
}

/* ── Header ── */
.hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
  padding: 14px 18px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(29,78,216,.25);
}
.hdr-title { font-size: 17px; font-weight: 700; color: #ffffff; letter-spacing:.04em; }
.hdr-time  { font-size: 12px; color: #c7d2fe; font-weight: 600; }

/* ── Top Cards ── */
.cards {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-bottom: 14px;
}
.kart {
  background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
  border: 1px solid #c7d2fe;
  border-radius: 10px;
  padding: 18px 20px;
  text-align: center;
  box-shadow: 0 1px 3px rgba(15,23,42,.08);
}
.kart-lbl  { font-size: 10px; font-weight:700; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
.kart-v1   { font-size: 26px; font-weight: 700; line-height:1.1; }
.kart-v2   { font-size: 13px; color: var(--muted); margin-top: 4px; }
.kart-pct  { font-size: 15px; font-weight: 600; margin-top: 5px; }

/* ── Tab Bar ── */
.tabbar {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  background: #1d4ed8;
  border: 1px solid #1d4ed8;
  border-radius: 10px;
  padding: 5px;
  margin-bottom: 14px;
}
.tb {
  background: transparent;
  border: none;
  color: rgba(255,255,255,.75);
  padding: 6px 9px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 7px;
  transition: all .18s;
}
.tb:hover { color: #fff; background: rgba(255,255,255,.15); }
.tb.act   { background: #fff; color: #1d4ed8; font-weight: 700; }

/* ── Tab Panels ── */
.panel { display: none; }
.panel.act { display: block; }

/* ── Section Box ── */
.sbox {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 14px;
}
.sbox-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* ── Data Table ── */
.dtbl { width:100%; border-collapse:collapse; }
.dtbl th {
  font-size: 14px;
  font-weight: 700;
  letter-spacing:.08em;
  color: var(--text);
  text-transform: uppercase;
  padding: 7px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.dtbl td { padding: 11px 12px; border-bottom: 1px solid rgba(15,23,42,.06); }
.dtbl tr:last-child td { border-bottom: none; }
.dtbl tr:hover td { background: rgba(15,23,42,.03); }
/* Compact table cells */
.table-scroll .dtbl th,
.table-scroll .dtbl td { padding: 8px 10px; font-size: 13px; white-space: nowrap; }
@media (max-width: 768px) {
  .table-scroll .dtbl th,
  .table-scroll .dtbl td { padding: 7px 7px; font-size: 12px; }
}
@media (max-width: 480px) {
  .table-scroll .dtbl th,
  .table-scroll .dtbl td { padding: 6px 5px; font-size: 11px; }
}
/* Sticky first column */
.dtbl th:first-child,
.dtbl td:first-child {
  position: sticky;
  left: 0;
  background: var(--card);
  z-index: 1;
  font-weight: 700;
}
.dtbl tr:hover td:first-child { background: #f8fafc; }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; position: relative; }
.table-scroll .dtbl { min-width: 420px; }
.c-yellow { color: var(--yellow); font-weight: 600; }
.c-green  { color: var(--green);  font-weight: 600; }
.c-red    { color: var(--red);    font-weight: 600; }
.c-orange { color: var(--orange); font-weight: 600; }

/* ── Charts Row ── */
.chart-row { display: grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
.cbox {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  height: 320px;
  display: flex;
  flex-direction: column;
}
.cbox canvas { flex: 1; min-height: 0; }
.cbox-title { font-size:10px; font-weight:700; letter-spacing:.08em; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }

/* ── Analysis Cards ── */
.anlz-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.anlz-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  display: flex;
  flex-direction: column;
}
.anlz-hdr {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-bottom: 12px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.anlz-code  { font-size:22px; font-weight:700; color:var(--yellow); }
.anlz-price { font-size:12px; color:var(--muted); margin-top:3px; }
.anlz-right { text-align:right; }
.oneri-tag  { font-size:14px; font-weight:800; letter-spacing:.04em; color:#fff; padding:5px 13px; border-radius:999px; display:inline-block; }
.anlz-puan  { font-size:12px; color:var(--muted); margin-top:4px; }
.anlz-puan span { color:var(--text); font-weight:600; }
.anlz-sec { margin-bottom:11px; }
.anlz-sec:last-child { margin-bottom:0; }
.anlz-sec-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.anlz-sec-text { font-size:12px; line-height:1.65; color:#475569; }

/* ── Yorum ── */
.yorum-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.yorum-main-title { font-size:10px; font-weight:700; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; }
.yorum-date { font-size:12px; color:var(--muted); }
.yorum-kart {
  background: rgba(15,23,42,.02);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.yorum-kart:last-child { margin-bottom:0; }
.yorum-kart-title {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .07em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: #fff;
  padding: 5px 11px;
  border-radius: 7px;
}
.yorum-kart-text { font-size:13px; line-height:1.75; color:#475569; }

/* ── Performans ── */
.perf-stats {
  display: flex;
  gap: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 18px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.pstat { display:flex; align-items:center; gap:5px; font-size:12px; }
.pstat-lbl { color:var(--muted); font-weight:500; }
.pstat-val { font-weight:700; }
.psep { color:#2a3d58; margin: 0 12px; font-size:14px; }

.filter-row { display:flex; justify-content:flex-end; gap:6px; margin-bottom:12px; }
.fbtn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 18px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 6px;
  transition: all .15s;
}
.fbtn:hover { color:var(--text); }
.fbtn.act { background:var(--blue); border-color:var(--blue); color:#fff; font-weight:700; }

.pcbox {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}
.pcbox:last-child { margin-bottom:0; }

/* ── Değişim Satırı ── */
.chg-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap;
           font-size:11px; padding:6px 0; border-bottom:1px solid var(--border); margin-bottom:4px; }
.chg-lbl { color:var(--muted); }
.chg-up   { color:#16a34a; font-weight:700; }
.chg-dn   { color:#dc2626; font-weight:700; }
.chg-same { color:var(--muted); }
.chg-onr  { color:#ea580c; font-weight:700; }
.chg-sep  { color:var(--border); }

/* ── Blok Barları ── */
.blk-wrap { margin: 0 0 12px; border-bottom: 1px solid var(--border); padding: 12px 0; }
.blk-row  { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.blk-lbl  { font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase;
            letter-spacing:.04em; width:76px; flex-shrink:0; }
.blk-track { flex:1; height:5px; background:#e2e8f0; border-radius:3px;
             position:relative; overflow:hidden; }
.blk-track::after { content:''; position:absolute; left:50%; top:0; bottom:0;
                    width:1px; background:#94a3b8; }
.blk-fill  { height:100%; border-radius:3px; }
.blk-val   { font-size:10px; font-weight:700; width:32px; text-align:right;
             flex-shrink:0; }

/* ── Loading / Error ── */
.loading { display:flex; justify-content:center; align-items:center; padding:40px; color:var(--muted); font-size:13px; }
.error   { color:var(--red); padding:20px; font-size:13px; white-space:pre-wrap; }

/* ── Responsive — Tablet ── */
@media (max-width: 768px) {
  body { padding: 8px 8px; }
  .container { padding: 8px 8px; }
  .sbox { padding: 10px 8px; }

  /* 4 kart → 2x2 */
  .cards { grid-template-columns: 1fr 1fr; }

  /* Tab bar metinleri küçülsün */
  .tb { font-size: 11px; padding: 8px 4px; }

  /* İki grafik alt alta */
  .chart-row { grid-template-columns: 1fr; }
  .cbox { height: 280px; }

  /* Analiz kartları tek sütun */
  .anlz-grid { grid-template-columns: 1fr; }

  /* Performans stats wrap */
  .perf-stats { gap: 8px; padding: 10px 12px; }
  .psep { margin: 0 6px; }
}

/* ── Responsive — Telefon ── */
@media (max-width: 480px) {
  body { padding: 14px 4px; }
  .container { padding: 14px 4px; }
  .sbox { padding: 10px 6px; }
  .sbox-title { margin-bottom: 8px; }

  .hdr-title { font-size: 14px; }
  .hdr-time  { font-size: 11px; }

  /* Kartlar 2x2 korunur, değer yazıları küçülür */
  .cards { gap: 8px; }
  .kart  { padding: 14px 12px; }
  .kart-v1  { font-size: 20px; }
  .kart-lbl { font-size: 9px; }

  /* Tab bar */
  .tabbar { padding: 4px; gap: 0; }
  .tb { font-size: 10px; padding: 7px 2px; border-radius: 5px; }

  /* Tablo sütunları sığsın */
  .dtbl th, .dtbl td { padding: 9px 8px; font-size: 11px; }

  /* Grafikler */
  .cbox { height: 240px; }

  /* Performans istatistikleri yan yana wrap */
  .perf-stats { flex-wrap: wrap; gap: 6px 10px; padding: 10px 12px; }
  .psep { display: none; }
  .filter-row { flex-wrap: wrap; gap: 5px; }
  .fbtn { padding: 5px 12px; font-size: 11px; }
}
</style>
</head>
<body>
<div class="container">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">Yatırım Günlüğü</div>
  <div class="hdr-time" id="clock">—</div>
</div>

<!-- TOP CARDS -->
<div class="cards">
  <div class="kart">
    <div class="kart-lbl">Portföy</div>
    <div class="kart-v1" style="color:var(--yellow)" id="cPortDolar">—</div>
    <div class="kart-v2" id="cPortTl">—</div>
  </div>
  <div class="kart">
    <div class="kart-lbl">Anapara</div>
    <div class="kart-v1" style="color:var(--blue)" id="cAnapara">—</div>
  </div>
  <div class="kart">
    <div class="kart-lbl">Tüm Zamanlar Kâr</div>
    <div class="kart-v1" id="cKarDolar">—</div>
    <div class="kart-pct" id="cKarPct">—</div>
  </div>
  <div class="kart">
    <div class="kart-lbl">Beta</div>
    <div class="kart-v1" id="cBeta">—</div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tabbar">
  <button class="tb act" onclick="tab('portfoy',0)">Portföy</button>
  <button class="tb"     onclick="tab('analiz',1)">Analiz</button>
  <button class="tb"     onclick="tab('yorum',2)">Yorum</button>
  <button class="tb"     onclick="tab('izleme',3)">İzleme</button>
  <button class="tb"     onclick="tab('performans',4)">Performans</button>
</div>

<!-- ── PANEL: PORTFÖY ── -->
<div id="p-portfoy" class="panel act">
  <div class="sbox">
    <div class="sbox-title">Portföy</div>
    <div id="portTbl"><div class="loading">Yükleniyor…</div></div>
  </div>
  <div class="chart-row">
    <div class="cbox">
      <div class="cbox-title">Portföy Dağılımı (%)</div>
      <canvas id="pieChart" height="260"></canvas>
    </div>
    <div class="cbox">
      <div class="cbox-title">Değer Dağılımı ($)</div>
      <canvas id="barChart"></canvas>
    </div>
  </div>
</div>

<!-- ── PANEL: ANALİZ ── -->
<div id="p-analiz" class="panel">
  <div id="analizContent"><div class="loading">Yükleniyor…</div></div>
</div>

<!-- ── PANEL: YORUM ── -->
<div id="p-yorum" class="panel">
  <div class="sbox">
    <div id="yorumContent"><div class="loading">Yükleniyor…</div></div>
  </div>
</div>

<!-- ── PANEL: İZLEME ── -->
<div id="p-izleme" class="panel">
  <div class="sbox">
    <div class="sbox-title">İzleme Listesi</div>
    <div id="izlemeTbl"><div class="loading">Yükleniyor…</div></div>
  </div>
  <div id="izlemeContent"></div>
</div>

<!-- ── PANEL: PERFORMANS ── -->
<div id="p-performans" class="panel">
  <div class="perf-stats" id="perfStats"><div class="loading">Yükleniyor…</div></div>
  <div class="filter-row">
    <button class="fbtn act" onclick="setFilter('gunluk',0)">Günlük</button>
    <button class="fbtn"     onclick="setFilter('aylik',1)">Aylık</button>
    <button class="fbtn"     onclick="setFilter('ceyrek',2)">Çeyrek</button>
    <button class="fbtn"     onclick="setFilter('yillik',3)">Yıllık</button>
  </div>
  <div class="pcbox">
    <div class="cbox-title">Portföy Değeri (USD)</div>
    <canvas id="perfLine" height="170"></canvas>
  </div>
  <div class="pcbox">
    <div class="cbox-title">Dönemsel Kar/Zarar Değişimi (USD)</div>
    <canvas id="perfKar" height="150"></canvas>
  </div>
  <div class="pcbox">
    <div class="cbox-title">Dönemsel Para Ekleme (USD)</div>
    <canvas id="perfPara" height="150"></canvas>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
var G = {};
var charts = {};
var perfFilter = 'gunluk';
var COLORS = ['#1d4ed8','#16a34a','#ea580c','#7c3aed','#0d9488','#dc2626','#ca8a04','#0891b2','#db2777','#65a30d'];

// Öneri rengi — client-side (Turkish char safe, deployment bağımsız)
function oneriTagColor(kisa) {
  var k = (kisa || '').replace(/ı/g,'i').replace(/İ/g,'I').toUpperCase().trim();
  if (k === 'ARTIR' || k === 'AL')   return '#16a34a';
  if (k === 'TUT')                   return '#64748b';
  if (k === 'KAR AL')                return '#ea580c';
  if (k === 'AZALT')                 return '#7c3aed';
  if (k === 'BEKLE')                 return '#2563eb';
  if (k === 'UZAK DUR' || k === 'SAT') return '#dc2626';
  if (k.indexOf('BUY')  >= 0)        return '#16a34a';
  if (k.indexOf('SELL') >= 0)        return '#dc2626';
  return '#64748b';
}
function fPuan(v) { return (v == null || isNaN(v)) ? '—' : Math.round(v); }
function fBeta(v) { return (v == null || isNaN(v) || v === 0) ? '—' : fNum(v,2); }

// ═══════════════════════════════════════════════
//  TABLO SIRALAMA STATE
// ═══════════════════════════════════════════════
var portSort  = { col: 'puan', asc: false };
var izleSort  = { col: 'puan', asc: false };
var _puanMap  = {};  // portfolio için puan cross-ref (global erişim için)

function _sortIcon(state, col) {
  if (state.col !== col) return '<span style="opacity:.25;font-size:10px;margin-left:2px">⇅</span>';
  return state.asc
    ? '<span style="font-size:10px;margin-left:2px;color:var(--accent)">▲</span>'
    : '<span style="font-size:10px;margin-left:2px;color:var(--accent)">▼</span>';
}

function _sortData(items, col, asc, puanOverride) {
  return items.slice().sort(function(a, b) {
    var av = col === 'puan' && puanOverride
      ? (puanOverride[a.varlik.toLowerCase()] != null ? puanOverride[a.varlik.toLowerCase()] : (a.puan || 0))
      : (a[col] != null ? a[col] : 0);
    var bv = col === 'puan' && puanOverride
      ? (puanOverride[b.varlik.toLowerCase()] != null ? puanOverride[b.varlik.toLowerCase()] : (b.puan || 0))
      : (b[col] != null ? b[col] : 0);
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return asc ? -1 :  1;
    if (av > bv) return asc ?  1 : -1;
    return 0;
  });
}

function sortPortfoy(col) {
  if (portSort.col === col) { portSort.asc = !portSort.asc; }
  else { portSort.col = col; portSort.asc = false; }
  renderPortfolio(G.portfolio);
}

function sortIzleme(col) {
  if (izleSort.col === col) { izleSort.asc = !izleSort.asc; }
  else { izleSort.col = col; izleSort.asc = false; }
  renderWatchlistTable(G.watchlist);
}

// ═══════════════════════════════════════════════
//  FORMAT HELPERS
// ═══════════════════════════════════════════════
function fUSD(v) {
  if (isNaN(v)) return '—';
  return '$' + Math.abs(v).toLocaleString('en-US', {maximumFractionDigits:0});
}
function fTL(v) {
  if (isNaN(v)) return '—';
  return '₺' + Math.abs(v).toLocaleString('tr-TR', {maximumFractionDigits:0});
}
function fPct(v, dec) {
  if (isNaN(v)) return '—';
  dec = dec !== undefined ? dec : 2;
  return (v >= 0 ? '+' : '') + v.toFixed(dec) + '%';
}
function fNum(v, dec) { return Number(v).toFixed(dec !== undefined ? dec : 2); }
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

// ═══════════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════════
function tab(name, idx) {
  document.querySelectorAll('.tb').forEach(function(b){ b.classList.remove('act'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('act'); });
  document.querySelectorAll('.tb')[idx].classList.add('act');
  document.getElementById('p-' + name).classList.add('act');
  if (name === 'performans' && G.performance) renderPerfCharts(perfFilter);
}

// ═══════════════════════════════════════════════
//  CARDS
// ═══════════════════════════════════════════════
function renderCards(d) {
  document.getElementById('cPortDolar').textContent = fUSD(d.portfolioDolar);
  document.getElementById('cPortTl').textContent    = fTL(d.portfolioTl);
  document.getElementById('cAnapara').textContent   = fUSD(d.anapara);

  var karEl = document.getElementById('cKarDolar');
  karEl.textContent  = (d.karDolar >= 0 ? '+' : '-') + fUSD(Math.abs(d.karDolar));

// ═══════════════════════════════════════════════
function blkBar(label, v) {
  var pct   = ((v + 100) / 200 * 100).toFixed(1);
  var color = v > 10 ? '#16a34a' : v < -10 ? '#dc2626' : '#94a3b8';
  var sign  = v > 0 ? '+' : '';
  return '<div class="blk-row">'
    + '<span class="blk-lbl">' + label + '</span>'
    + '<div class="blk-track"><div class="blk-fill" style="width:' + pct + '%;background:' + color + '"></div></div>'
    + '<span class="blk-val" style="color:' + color + '">' + sign + Math.round(v) + '</span>'
    + '</div>';
}

//  ANALİZ / İZLEME CARDS
// ═══════════════════════════════════════════════
function renderAnalysisCards(containerId, items) {
  if (!items || !items.length) {
    document.getElementById(containerId).innerHTML = '<div class="loading">Veri yok</div>';
    return;
  }
  var h = '<div class="anlz-grid">';
  items.forEach(function(r) {
    // Blok skorları varsa göster (hepsi 0 ise henüz yazılmamış demektir)
    var hasBlocks = r.trend || r.momentum || r.flow || r.volume;
    var blocks = '';
    if (hasBlocks) {
      blocks = '<div class="blk-wrap">'
        + blkBar('TREND',       r.trend    || 0)
        + blkBar('MOMENTUM',    r.momentum || 0)
        + blkBar('MONEY FLOW',  r.flow     || 0)
        + blkBar('VOLUME',      r.volume   || 0)
        + '</div>';
    }

    // Değişim satırı — önceki veri varsa göster
    var chgRow = '';
    var hasPrev = r.prevSignal != null && (r.prevSignal !== 0 || r.signal !== 0);
    if (hasPrev) {
      var delta   = Math.round(r.signal || 0) - Math.round(r.prevSignal || 0);
      var dSign   = delta > 0 ? '+' : '';
      var dCls    = delta > 0 ? 'chg-up' : delta < 0 ? 'chg-dn' : 'chg-same';
      var dArrow  = delta > 0 ? '↑' : delta < 0 ? '↓' : '→';
      var sigHtml = '<span class="chg-lbl">Puan</span> <span class="' + dCls + '">'
                  + dArrow + dSign + delta + '</span>';
      var oneriChanged = r.prevOneri && r.prevOneri !== '' && r.prevOneri !== r.oneriKisa;
      var oneriHtml = oneriChanged
        ? '<span class="chg-sep">·</span><span class="chg-onr">'
          + esc(r.prevOneri) + ' → ' + esc(r.oneriKisa) + '</span>'
        : '<span class="chg-sep">·</span><span class="chg-same">Öneri ✓</span>';
      chgRow = '<div class="chg-row">' + sigHtml + oneriHtml + '</div>';
    }

    h += '<div class="anlz-card">'
      + '<div class="anlz-hdr">'
      +   '<div>'
      +     '<div class="anlz-code">' + esc(r.varlik) + '</div>'
      +     '<div class="anlz-price">$' + fNum(r.fiyat,2) + '</div>'
      +   '</div>'
      +   '<div class="anlz-right">'
      +     '<div class="oneri-tag" style="background:' + oneriTagColor(r.oneriKisa) + '">' + esc(r.oneriKisa.toUpperCase()) + '</div>'
      +     '<div class="anlz-puan"><span>' + fPuan(r.puan) + '</span> / 100 puan</div>'
      +   '</div>'
      + '</div>'
      + chgRow
      + blocks
      + '<div class="anlz-sec"><div class="anlz-sec-title">Analiz</div>'
      +   '<div class="anlz-sec-text">' + esc(r.analiz) + '</div></div>'
      + '<div class="anlz-sec"><div class="anlz-sec-title">Aksiyon</div>'
      +   '<div class="anlz-sec-text">' + esc(r.oneriTam) + '</div></div>'
      + '</div>';
  });
  h += '</div>';
  document.getElementById(containerId).innerHTML = h;
}

// ═══════════════════════════════════════════════
//  PERFORMANS — AGGREGATİON
// ═══════════════════════════════════════════════
function aggregate(raw, mode) {
  if (mode === 'gunluk') {
    return raw.map(function(d){ return { label:d.tarihStr, portfoy:d.portfoy, kar:d.gunlukKar, para:d.paraEkleme }; });
  }
  var groups = {}, order = [];
  raw.forEach(function(d) {
    var parts = d.tarihStr.split('.');
    var dd = +parts[0], mm = +parts[1], yy = +parts[2];
    var key;
    if (mode === 'aylik')  key = yy + '-' + String(mm).padStart(2,'0');
    if (mode === 'ceyrek') key = yy + '-Q' + Math.ceil(mm/3);
    if (mode === 'yillik') key = String(yy);
    if (!groups[key]) { groups[key] = { label:key, lastPortfoy:0, kar:0, para:0 }; order.push(key); }
    groups[key].lastPortfoy = d.portfoy;
    groups[key].kar  += d.gunlukKar;
    groups[key].para += d.paraEkleme;
  });
  return order.map(function(k){
    var g = groups[k];
    return { label:g.label, portfoy:g.lastPortfoy, kar:g.kar, para:g.para };
  });
}

function init(data) {

    document.body.innerHTML = '<div class="error">❌ Hata:\n' + data.error + '</div>';
    return;
  }
  G = data;

  // GitHub'a push edildiği tarih/saat
  document.getElementById('clock').textContent = data.generatedAt || '';

  renderCards(data.cards);
  renderPortfolio(data.portfolio);
  renderAnalysisCards('analizContent', data.analysis);
  renderYorum(data.commentary);
  renderWatchlistTable(data.watchlist);
  renderAnalysisCards('izlemeContent', data.watchlist);
  renderPerfStats(data.performance.stats);
}
